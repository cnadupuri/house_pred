name: House Price CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn joblib notebook

    - name: Verify project files
      run: |
        ls -la
        test -f model.pkl
        test -f encoder.pkl
        echo "Model and encoder found."

    - name: CI Success
      run: echo "GitHub Actions CI pipeline completed successfully!"
